name: EAS Build with Custom Certs

on:
  push:
    branches:
      - dev-ble  # 如果你的主分支叫 master，请改为 master
  workflow_dispatch: # 允许手动在 GitHub 页面点击触发

jobs:
  build:
    name: Build iOS
    runs-on: ubuntu-latest
    steps:
      - name: 🛒 Checkout repository
        uses: actions/checkout@v3

      - name: 📦 Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
          
      - name: 🛠️ Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: 📥 Install dependencies
        run: npm install 

      - name: 📝 Prepare Custom Certificates
        run: |
          mkdir -p ./certs
          # 使用 Linux 原生的 base64 命令解码
          echo "${{ secrets.IOS_DIST_CERT }}" | base64 --decode > ./certs/cert.p12
          # 还原 .mobileprovision 描述文件
          echo "${{ secrets.IOS_PROV_PROFILE }}" > ./certs/profile.mobileprovision

      - name: 🔑 Inject Credentials into eas.json
        # 这一步强制修改 eas.json，让 EAS CLI 认为配置已经完成了
        run: |
          # 1. 备份原始文件
          cp eas.json eas.json.bak
          
          # 2. 使用 sed 修改 eas.json
          # 我们将 "ios": {} 替换为包含证书路径的配置
          # 注意：这里假设你的 eas.json 里 "preview" 下面有 "ios": {}
          sed -i 's/"ios": {}/"ios": {\n      "provisioningProfile": ".\/certs\/profile.mobileprovision",\n      "distributionCertificate": {\n        "path": ".\/certs\/cert.p12",\n        "password": "${{ secrets.IOS_DIST_CERT_PWD }}"\n      }\n    }/g' eas.json
          
          # 3. 打印修改后的文件以便调试
          cat eas.json

      - name: 🏗️ Run EAS Build
        run: |
          eas build \
            --platform ios \
            --profile preview \
            --non-interactive \
            --no-wait