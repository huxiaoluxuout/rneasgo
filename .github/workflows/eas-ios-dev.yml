name: EAS Build with Custom Certs

on:
  push:
    branches:
      - dev-ble  # 如果你的主分支叫 master，请改为 master
  workflow_dispatch: # 允许手动在 GitHub 页面点击触发

jobs:
  build:
    name: Build iOS
    runs-on: ubuntu-latest
    steps:
      - name: 🛒 Checkout repository
        uses: actions/checkout@v3

      - name: 📦 Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
          
      - name: 🛠️ Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: 📥 Install dependencies
        run: npm install 

      - name: 📝 Prepare Custom Certificates
        # 这一步是将 GitHub Secrets 里的字符串还原成 EAS 能识别的临时文件
        run: |
          mkdir -p ./certs
          # 【修改点】使用 Linux 原生的 base64 命令解码，而不是 Windows 的 certutil
          echo "${{ secrets.IOS_DIST_CERT }}" | base64 --decode > ./certs/cert.p12
          # 还原 .mobileprovision 描述文件
          echo "${{ secrets.IOS_PROV_PROFILE }}" > ./certs/profile.mobileprovision
      - name: 🔑 Configure EAS Credentials
        run: |
          eas credentials:configure \
            --platform ios \
            --profile preview \
            --non-interactive \
            --keystore-path ./certs/cert.p12 \
            --keystore-password "${{ secrets.IOS_DIST_CERT_PWD }}" \
            --dist-cert-path ./certs/cert.p12 \
            --dist-cert-password "${{ secrets.IOS_DIST_CERT_PWD }}" \
            --provisioning-profile-path ./certs/profile.mobileprovision
            
      - name: 🏗️ Run EAS Build
        # 使用环境变量告诉 EAS 使用我们刚才还原的证书，而不是让它自动去 Apple 申请
        run: |
          eas build \
            --platform ios \
            --profile preview \
            --non-interactive \
            --no-wait
        env:
          EXPO_IOS_DIST_CERT_PATH: ./certs/cert.p12
          EXPO_IOS_DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PWD }}
          EXPO_IOS_PROV_PROFILE_PATH: ./certs/profile.mobileprovision