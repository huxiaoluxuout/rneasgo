name: EAS Build with Custom Certs

on:
  push:
    branches:
      - dev-ble  # 如果你的主分支叫 master，请改为 master
  workflow_dispatch: # 允许手动在 GitHub 页面点击触发

jobs:
  build:
    name: Build iOS
    runs-on: ubuntu-latest
    steps:
      - name: 🛒 Checkout repository
        uses: actions/checkout@v3

      - name: 📦 Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
          
      - name: 🛠️ Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: 📥 Install dependencies
        run: npm install 

      - name: 📝 Prepare Custom Certificates
        run: |
          mkdir -p ./certs
          # 使用 Linux 原生的 base64 命令解码
          echo "${{ secrets.IOS_DIST_CERT }}" | base64 --decode > ./certs/cert.p12
          # 还原 .mobileprovision 描述文件
          echo "${{ secrets.IOS_PROV_PROFILE }}" > ./certs/profile.mobileprovision

      - name: 🔑 Configure EAS Locally
        # 这一步创建一个本地的 credentials.json 文件
        # EAS CLI 会优先读取这个文件，从而跳过服务器配置检查
        run: |
          mkdir -p .expo
          cat > .expo/credentials.json << 'EOF'
          {
            "ios": {
              "provisioningProfilePath": "./certs/profile.mobileprovision",
              "distributionCertificate": {
                "path": "./certs/cert.p12",
                "password": "${{ secrets.IOS_DIST_CERT_PWD }}"
              }
            }
          }
          EOF
          # 打印文件内容以确认格式正确
          cat .expo/credentials.json

      - name: 🏗️ Run EAS Build
        run: |
          eas build \
            --platform ios \
            --profile preview \
            --non-interactive \
            --no-wait